<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - YOLO11 智能农业系统</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gemini-gradient: linear-gradient(135deg, #4285F4 0%, #9B72F2 25%, #D96570 50%, #F2A25C 75%, #4285F4 100%);
            --gemini-blue: #4285F4;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --text-primary: #1F1F1F;
            --text-secondary: #5F6368;
            --border-color: #E8EAED;
            --shadow-md: 0 2px 6px 0 rgba(60, 64, 67, 0.15);
            --radius-md: 16px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Product Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-primary);
            padding: 16px 24px;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--gemini-blue);
            color: white;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            flex: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 10px 20px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-full);
            background: var(--bg-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
        }

        .filter-tab:hover {
            border-color: var(--gemini-blue);
            color: var(--gemini-blue);
        }

        .filter-tab.active {
            background: var(--gemini-gradient);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            color: white;
            border-color: transparent;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .favorite-card {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .favorite-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(60, 64, 67, 0.2);
        }

        .favorite-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .favorite-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .favorite-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-view {
            background: var(--gemini-blue);
            color: white;
        }

        .btn-view:hover {
            background: #3367D6;
        }

        .btn-remove {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .btn-remove:hover {
            background: #EA4335;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            display: inline-flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .loading-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: loadingBounce 1.4s infinite ease-in-out;
        }

        .loading-dot:nth-child(1) {
            background: var(--gemini-blue);
            animation-delay: 0s;
        }

        .loading-dot:nth-child(2) {
            background: #9B72F2;
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            background: #D96570;
            animation-delay: 0.4s;
        }

        @keyframes loadingBounce {
            0%, 80%, 100% {
                transform: scale(0.6) translateY(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1) translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
                <span>返回</span>
            </button>
            <div class="page-title">
                <i class="fas fa-star"></i> 我的收藏
            </div>
        </div>
    </div>

    <div class="container">
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterByType('')">
                <i class="fas fa-th"></i> 全部
            </button>
            <button class="filter-tab" onclick="filterByType('news')">
                <i class="fas fa-newspaper"></i> 新闻
            </button>
            <button class="filter-tab" onclick="filterByType('detection')">
                <i class="fas fa-image"></i> 检测结果
            </button>
        </div>

        <div id="favoritesContainer">
            <div class="loading">
                <div class="loading-spinner">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
                <div>正在加载收藏...</div>
            </div>
        </div>
    </div>

    <script>
        let allFavorites = [];
        let currentFilter = '';

        window.onload = function() {
            checkLogin();
            loadFavorites();
        };

        function checkLogin() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('请先登录');
                window.location.href = '/login';
            }
        }

        async function loadFavorites() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('/api/favorites/?limit=100', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    allFavorites = await response.json();
                    displayFavorites(allFavorites);
                } else {
                    showError('加载收藏失败');
                }
            } catch (error) {
                console.error('加载收藏失败:', error);
                showError('加载失败：' + error.message);
            }
        }

        function filterByType(type) {
            currentFilter = type;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.filter-tab').classList.add('active');
            
            // 筛选收藏
            if (!type) {
                displayFavorites(allFavorites);
            } else {
                const filtered = allFavorites.filter(fav => fav.item_type === type);
                displayFavorites(filtered);
            }
        }

        function displayFavorites(favorites) {
            const container = document.getElementById('favoritesContainer');
            
            if (!favorites || favorites.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⭐</div>
                        <div>暂无收藏</div>
                        <p style="margin-top: 8px; font-size: 14px;">快去收藏你喜欢的内容吧！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="favorites-grid">
                    ${favorites.map(fav => `
                        <div class="favorite-card">
                            <div class="favorite-title">${escapeHtml(fav.item_title || '无标题')}</div>
                            <div class="favorite-meta">
                                <span><i class="fas fa-tag"></i> ${getTypeLabel(fav.item_type)}</span>
                                <span><i class="fas fa-clock"></i> ${formatTime(fav.created_at)}</span>
                            </div>
                            <div class="favorite-actions">
                                <button class="action-btn btn-view" onclick="viewItem('${fav.item_type}', ${fav.item_id})">
                                    <i class="fas fa-eye"></i> 查看
                                </button>
                                <button class="action-btn btn-remove" onclick="removeFavorite('${fav.item_type}', ${fav.item_id})">
                                    <i class="fas fa-trash"></i> 移除
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function getTypeLabel(type) {
            const labels = {
                'news': '新闻',
                'detection': '检测结果'
            };
            return labels[type] || type;
        }

        function viewItem(type, id) {
            if (type === 'news') {
                window.location.href = `/news/${id}`;
            } else if (type === 'detection') {
                window.location.href = `/result/${id}`;
            }
        }

        async function removeFavorite(type, id) {
            if (!confirm('确定要取消收藏吗？')) {
                return;
            }

            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/favorites/${type}/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok || response.status === 204) {
                    alert('✅ 已取消收藏');
                    loadFavorites();
                } else {
                    alert('❌ 取消收藏失败');
                }
            } catch (error) {
                console.error('取消收藏失败:', error);
                alert('❌ 操作失败：' + error.message);
            }
        }

        function showError(message) {
            document.getElementById('favoritesContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">❌</div>
                    <div>${message}</div>
                </div>
            `;
        }

        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.host)) {
                window.history.back();
            } else {
                window.location.href = '/profile';
            }
        }

        function formatTime(dateStr) {
            if (!dateStr) return '未知时间';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
