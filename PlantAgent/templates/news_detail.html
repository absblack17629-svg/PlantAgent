<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻详情 - YOLO11 智能农业系统</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gemini-gradient: linear-gradient(135deg, #4285F4 0%, #9B72F2 25%, #D96570 50%, #F2A25C 75%, #4285F4 100%);
            --gemini-blue: #4285F4;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --text-primary: #1F1F1F;
            --text-secondary: #5F6368;
            --text-tertiary: #80868B;
            --border-color: #E8EAED;
            --shadow-sm: 0 1px 2px 0 rgba(60, 64, 67, 0.1);
            --shadow-md: 0 2px 6px 0 rgba(60, 64, 67, 0.15);
            --radius-md: 16px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Product Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* 顶部导航 */
        .header {
            background: var(--bg-primary);
            padding: 16px 24px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--gemini-blue);
            color: white;
            transform: translateX(-4px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--gemini-gradient);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo-text {
            font-size: 16px;
            font-weight: 600;
            background: var(--gemini-gradient);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 8s ease infinite;
        }

        /* 主内容 */
        .main-content {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .article {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 40px;
            box-shadow: var(--shadow-md);
        }

        .article-header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        .article-title {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-item i {
            color: var(--gemini-blue);
        }

        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--gemini-gradient);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            color: white;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
        }

        .article-summary {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: var(--radius-md);
            border-left: 4px solid var(--gemini-blue);
            margin-bottom: 32px;
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .article-content {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .article-content p {
            margin-bottom: 16px;
        }

        /* 操作按钮 */
        .article-actions {
            display: flex;
            gap: 12px;
            margin-top: 40px;
            padding-top: 24px;
            border-top: 2px solid var(--border-color);
        }

        .action-btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-like {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn-like:hover {
            background: #EA4335;
            color: white;
            border-color: #EA4335;
            transform: translateY(-2px);
        }

        .btn-like.liked {
            background: #EA4335;
            color: white;
            border-color: #EA4335;
        }

        .btn-favorite {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn-favorite:hover {
            background: #FBBC04;
            color: white;
            border-color: #FBBC04;
            transform: translateY(-2px);
        }

        .btn-favorite.favorited {
            background: #FBBC04;
            color: white;
            border-color: #FBBC04;
        }

        .btn-share {
            background: var(--gemini-gradient);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            color: white;
        }

        .btn-share:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            display: inline-flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .loading-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: loadingBounce 1.4s infinite ease-in-out;
        }

        .loading-dot:nth-child(1) {
            background: var(--gemini-blue);
            animation-delay: 0s;
        }

        .loading-dot:nth-child(2) {
            background: #9B72F2;
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            background: #D96570;
            animation-delay: 0.4s;
        }

        @keyframes loadingBounce {
            0%, 80%, 100% {
                transform: scale(0.6) translateY(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1) translateY(-10px);
                opacity: 1;
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .article {
                padding: 24px 20px;
            }

            .article-title {
                font-size: 24px;
            }

            .article-meta {
                font-size: 13px;
            }

            .article-content {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <div class="header-content">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
                <span>返回列表</span>
            </button>
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-seedling"></i>
                </div>
                <div class="logo-text">YOLO11 智能农业</div>
            </div>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <div id="articleContainer">
            <div class="loading">
                <div class="loading-spinner">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
                <div>正在加载新闻详情...</div>
            </div>
        </div>
    </div>

    <script>
        let currentNewsId = null;
        let isLiked = false;
        let isFavorited = false;

        // 页面加载
        window.onload = function() {
            // 从URL路径获取新闻ID
            // URL格式: /news/123
            const pathParts = window.location.pathname.split('/');
            const newsId = pathParts[pathParts.length - 1];
            
            if (newsId && !isNaN(newsId)) {
                currentNewsId = parseInt(newsId);
                loadNewsDetail(currentNewsId);
                checkFavoriteStatus(currentNewsId);
            } else {
                showError('未指定新闻ID');
            }
        };

        // 加载新闻详情
        async function loadNewsDetail(newsId) {
            try {
                const response = await fetch(`/api/news/${newsId}`);
                
                if (response.ok) {
                    const news = await response.json();
                    displayNews(news);
                    // 添加浏览历史
                    addToHistory(newsId, news.title);
                } else {
                    showError('加载失败，新闻不存在');
                }
            } catch (error) {
                console.error('加载新闻详情失败:', error);
                showError('加载失败：' + error.message);
            }
        }

        // 添加浏览历史
        async function addToHistory(newsId, newsTitle) {
            const token = localStorage.getItem('token');
            if (!token) return; // 未登录不记录历史

            try {
                await fetch('/api/history/', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action_type: 'view_news',
                        item_id: newsId,
                        item_title: newsTitle,
                        action_detail: '查看新闻详情'
                    })
                });
                console.log('✅ 已添加到浏览历史');
            } catch (error) {
                console.error('添加历史记录失败:', error);
                // 静默失败，不影响用户体验
            }
        }

        // 检查收藏状态
        async function checkFavoriteStatus(newsId) {
            const token = localStorage.getItem('token');
            if (!token) return;

            try {
                const response = await fetch(`/api/favorites/check/news/${newsId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    isFavorited = data.is_favorited || false;
                    updateFavoriteButton();
                }
            } catch (error) {
                console.error('检查收藏状态失败:', error);
            }
        }

        // 更新收藏按钮状态
        function updateFavoriteButton() {
            const favoriteBtn = document.getElementById('favoriteBtn');
            const favoriteBtnText = document.getElementById('favoriteBtnText');
            
            if (favoriteBtn && favoriteBtnText) {
                if (isFavorited) {
                    favoriteBtn.classList.add('favorited');
                    favoriteBtnText.textContent = '已收藏';
                } else {
                    favoriteBtn.classList.remove('favorited');
                    favoriteBtnText.textContent = '收藏';
                }
            }
        }

        // 切换收藏状态
        async function toggleFavorite() {
            if (!currentNewsId) return;

            const token = localStorage.getItem('token');
            if (!token) {
                showToast('⚠️ 请先登录');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
                return;
            }

            try {
                if (isFavorited) {
                    // 取消收藏
                    const response = await fetch(`/api/favorites/news/${currentNewsId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok || response.status === 204) {
                        isFavorited = false;
                        updateFavoriteButton();
                        showToast('✅ 已取消收藏');
                    } else {
                        showToast('❌ 取消收藏失败');
                    }
                } else {
                    // 添加收藏
                    const newsTitle = document.querySelector('.article-title')?.textContent || '新闻';
                    const response = await fetch('/api/favorites/', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            item_type: 'news',
                            item_id: currentNewsId,
                            item_title: newsTitle
                        })
                    });

                    if (response.ok) {
                        isFavorited = true;
                        updateFavoriteButton();
                        showToast('⭐ 收藏成功！');
                    } else {
                        const data = await response.json();
                        showToast('❌ 收藏失败：' + (data.detail || '未知错误'));
                    }
                }
            } catch (error) {
                console.error('收藏操作失败:', error);
                showToast('❌ 操作失败：' + error.message);
            }
        }

        // 显示新闻
        function displayNews(news) {
            const container = document.getElementById('articleContainer');
            
            container.innerHTML = `
                <article class="article">
                    <div class="article-header">
                        <h1 class="article-title">${escapeHtml(news.title)}</h1>
                        <div class="article-meta">
                            <span class="meta-item">
                                <i class="fas fa-user"></i>
                                ${escapeHtml(news.author || '未知作者')}
                            </span>
                            <span class="meta-item">
                                <i class="fas fa-calendar"></i>
                                ${formatTime(news.created_at)}
                            </span>
                            <span class="meta-item">
                                <i class="fas fa-eye"></i>
                                ${news.view_count || 0} 浏览
                            </span>
                            <span class="meta-item">
                                <i class="fas fa-heart"></i>
                                <span id="likeCount">${news.like_count || 0}</span> 点赞
                            </span>
                            ${news.category ? `<span class="category-badge">${escapeHtml(news.category)}</span>` : ''}
                        </div>
                    </div>

                    ${news.summary ? `
                    <div class="article-summary">
                        <strong>📝 摘要：</strong>${escapeHtml(news.summary)}
                    </div>
                    ` : ''}

                    <div class="article-content">
                        ${escapeHtml(news.content || '暂无内容')}
                    </div>

                    <div class="article-actions">
                        <button class="action-btn btn-like" id="likeBtn" onclick="likeNews()">
                            <i class="fas fa-heart"></i>
                            <span id="likeBtnText">点赞</span>
                        </button>
                        <button class="action-btn btn-favorite" id="favoriteBtn" onclick="toggleFavorite()">
                            <i class="fas fa-star"></i>
                            <span id="favoriteBtnText">收藏</span>
                        </button>
                        <button class="action-btn btn-share" onclick="shareNews()">
                            <i class="fas fa-share-alt"></i>
                            <span>分享</span>
                        </button>
                    </div>
                </article>
            `;
        }

        // 显示错误
        function showError(message) {
            const container = document.getElementById('articleContainer');
            container.innerHTML = `
                <div class="loading">
                    <div style="font-size: 48px; margin-bottom: 16px;">❌</div>
                    <div>${message}</div>
                    <button class="back-btn" onclick="goBack()" style="margin-top: 20px;">
                        <i class="fas fa-arrow-left"></i>
                        <span>返回列表</span>
                    </button>
                </div>
            `;
        }

        // 点赞新闻
        async function likeNews() {
            if (!currentNewsId) return;

            try {
                const response = await fetch(`/api/news/${currentNewsId}/like`, {
                    method: 'POST'
                });

                if (response.ok) {
                    const data = await response.json();
                    const likeCount = data.like_count || data.data?.like_count || 0;
                    
                    // 更新点赞数
                    document.getElementById('likeCount').textContent = likeCount;
                    
                    // 更新按钮状态
                    const likeBtn = document.getElementById('likeBtn');
                    likeBtn.classList.add('liked');
                    document.getElementById('likeBtnText').textContent = '已点赞';
                    
                    // 显示提示
                    showToast('❤️ 点赞成功！');
                } else {
                    showToast('❌ 点赞失败');
                }
            } catch (error) {
                console.error('点赞失败:', error);
                showToast('❌ 点赞失败：' + error.message);
            }
        }

        // 分享新闻
        function shareNews() {
            const title = document.querySelector('.article-title')?.textContent || '新闻详情';
            const url = window.location.href;
            const text = `${title}\n\n来自 YOLO11 智能农业系统`;

            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: text,
                    url: url
                }).catch(err => console.log('分享失败:', err));
            } else {
                // 复制到剪贴板
                const shareText = `${text}\n${url}`;
                navigator.clipboard.writeText(shareText).then(() => {
                    showToast('✅ 链接已复制到剪贴板！');
                }).catch(() => {
                    showToast('📋 分享链接：' + url);
                });
            }
        }

        // 返回列表
        function goBack() {
            // 如果有来源页面，返回上一页
            if (document.referrer && document.referrer.includes(window.location.host)) {
                window.history.back();
            } else {
                // 否则跳转到首页
                window.location.href = '/';
            }
        }

        // 格式化时间
        function formatTime(dateStr) {
            if (!dateStr) return '未知时间';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(hours / 24);
            
            if (hours < 1) return '刚刚';
            if (hours < 24) return hours + '小时前';
            if (days < 7) return days + '天前';
            return date.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示提示
        function showToast(message) {
            // 简单的提示实现
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 24px;
                font-size: 14px;
                z-index: 10000;
                animation: fadeIn 0.3s ease;
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
    </script>
</body>
</html>
