<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - YOLO11 智能农业系统</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gemini-gradient: linear-gradient(135deg, #4285F4 0%, #9B72F2 25%, #D96570 50%, #F2A25C 75%, #4285F4 100%);
            --gemini-blue: #4285F4;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --text-primary: #1F1F1F;
            --text-secondary: #5F6368;
            --border-color: #E8EAED;
            --shadow-md: 0 2px 6px 0 rgba(60, 64, 67, 0.15);
            --radius-md: 16px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Product Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 40px;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            border-radius: var(--radius-md);
            background: var(--gemini-gradient);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo-text {
            font-size: 24px;
            font-weight: 600;
            background: var(--gemini-gradient);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 8s ease infinite;
        }

        .form-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gemini-blue);
            box-shadow: 0 0 0 4px rgba(66, 133, 244, 0.1);
        }

        .form-input.error {
            border-color: #EA4335;
        }

        .error-message {
            color: #EA4335;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: var(--gemini-gradient);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-footer a {
            color: var(--gemini-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: var(--gemini-blue);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-seedling"></i>
            </div>
            <div class="logo-text">YOLO11 智能农业</div>
        </div>

        <h2 class="form-title">用户注册</h2>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label" for="username">用户名 *</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    class="form-input" 
                    placeholder="请输入用户名"
                    required
                    minlength="3"
                    maxlength="50"
                >
                <div class="form-hint">3-50个字符</div>
                <div class="error-message" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">邮箱 *</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="请输入邮箱地址"
                    required
                >
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码 *</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    placeholder="请输入密码"
                    required
                    minlength="6"
                    maxlength="72"
                >
                <div class="form-hint">6-72个字符</div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">确认密码 *</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    class="form-input" 
                    placeholder="请再次输入密码"
                    required
                    maxlength="72"
                >
                <div class="error-message" id="confirmPasswordError"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-user-plus"></i> 注册
            </button>
        </form>

        <div class="form-footer">
            已有账号？<a href="/login">立即登录</a>
        </div>

        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> 返回首页
        </a>
    </div>

    <script>
        async function handleRegister(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            // 清除之前的错误
            clearErrors();

            // 验证
            if (username.length < 3) {
                showError('username', '用户名至少3个字符');
                return;
            }

            if (!email.includes('@')) {
                showError('email', '请输入有效的邮箱地址');
                return;
            }

            if (password.length < 6) {
                showError('password', '密码至少6个字符');
                return;
            }

            if (password.length > 72) {
                showError('password', '密码不能超过72个字符');
                return;
            }

            if (password !== confirmPassword) {
                showError('confirmPassword', '两次输入的密码不一致');
                return;
            }

            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';

            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // 注册成功
                    alert('✅ 注册成功！即将跳转到登录页面...');
                    
                    // 跳转到登录页
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1000);
                } else {
                    // 显示错误
                    const errorMsg = data.detail || data.msg || '注册失败';
                    if (errorMsg.includes('用户名')) {
                        showError('username', errorMsg);
                    } else if (errorMsg.includes('邮箱')) {
                        showError('email', errorMsg);
                    } else {
                        showError('password', errorMsg);
                    }
                }
            } catch (error) {
                console.error('注册失败:', error);
                showError('password', '注册失败：' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> 注册';
            }
        }

        function showError(field, message) {
            const input = document.getElementById(field);
            const error = document.getElementById(field + 'Error');
            
            input.classList.add('error');
            error.textContent = message;
            error.classList.add('show');
        }

        function clearErrors() {
            document.querySelectorAll('.form-input').forEach(input => {
                input.classList.remove('error');
            });
            document.querySelectorAll('.error-message').forEach(error => {
                error.classList.remove('show');
            });
        }

        // 输入时清除错误
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', function() {
                this.classList.remove('error');
                const error = document.getElementById(this.id + 'Error');
                if (error) {
                    error.classList.remove('show');
                }
            });
        });
    </script>
</body>
</html>
